<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <title>LocalBooster | 로컬 비즈니스 마케팅</title>
  <meta
    name="description"
    content="네이버 플레이스, 체험단, 퍼포먼스 마케팅까지. 로컬 비즈니스에 맞는 마케팅 전략을 설계합니다."
  />

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:Pretendard, "Noto Sans KR", Arial, sans-serif;
      color:#111;
      background:#fff;
      line-height:1.6;
      word-break:keep-all;
    }

    .container{
      width:min(1180px, calc(100% - 24px));
      margin:0 auto;
    }

    .hero-top{
      background:#2b7fff;
      color:#fff;
      text-align:center;
      padding:80px 0;
    }

    .hero-title{
      font-size:clamp(46px, 14vw, 120px);
      font-weight:900;
      margin:0;
      line-height:1.05;
    }

    .hero-sub{
      margin-top:10px;
      font-size:18px;
      opacity:0.9;
    }

    .section{
      padding:80px 0;
    }

    .section-title{
      font-size:clamp(30px, 7vw, 60px);
      font-weight:900;
      margin:0 0 16px;
      line-height:1.15;
    }

    .section-desc{
      color:#667085;
      font-size:16px;
      margin:0;
    }

    .contact-form{
      max-width:600px;
      margin:auto;
    }

    .field{
      margin-bottom:18px;
    }

    .field label{
      display:block;
      font-weight:700;
      margin-bottom:6px;
    }

    input, select, textarea{
      width:100%;
      padding:12px;
      border:1px solid #ddd;
      border-radius:8px;
      font:inherit;
      background:#fff;
    }

    textarea{
      min-height:120px;
      resize:vertical;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:100%;
      padding:14px 26px;
      border-radius:999px;
      font-weight:800;
      border:none;
      cursor:pointer;
      font-size:16px;
    }

    .btn-primary{
      background:#2b7fff;
      color:#fff;
    }

    .btn:disabled{
      opacity:.65;
      cursor:not-allowed;
    }

    .submit-status{
      display:none;
      margin-top:12px;
      padding:10px;
      border-radius:8px;
      font-weight:700;
      text-align:center;
    }

    .submit-status.success{
      display:block;
      background:#e8f9ef;
      color:#0b7c3e;
    }

    .submit-status.error{
      display:block;
      background:#ffeaea;
      color:#c80000;
    }

    @media (max-width: 768px){
      .hero-top{
        padding:64px 0;
      }

      .section{
        padding:56px 0;
      }
    }
  </style>

<body>
  <!-- GTM noscript -->
  <noscript>
    <iframe
      src="https://www.googletagmanager.com/ns.html?id=GTM-M2D936WX"
      height="0"
      width="0"
      style="display:none;visibility:hidden"
    ></iframe>
  </noscript>

  <section class="hero-top">
    <div class="container">
      <h1 class="hero-title">LocalBooster</h1>
      <p class="hero-sub">체험단 · 플레이스 · 퍼포먼스 마케팅</p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <h2 class="section-title">
        체험단부터 플레이스,<br />
        퍼포먼스 마케팅까지 연결합니다.
      </h2>

      <p class="section-desc">
        LocalBooster는 로컬 비즈니스에 맞는 체험단, 플레이스, 퍼포먼스 마케팅을 운영합니다.
      </p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <h2 class="section-title">무료 상담 신청</h2>

      <form id="consulting-form" class="contact-form">
        <div class="field">
          <label for="companyName">업체명</label>
          <input id="companyName" required />
        </div>

        <div class="field">
          <label for="businessType">업종</label>
          <input id="businessType" required />
        </div>

        <div class="field">
          <label for="region">지역</label>
          <input id="region" required />
        </div>

        <div class="field">
          <label for="phone">연락처</label>
          <input id="phone" type="tel" required />
        </div>

        <div class="field">
          <label for="adStatus">현재 광고 여부</label>
          <select id="adStatus" required>
            <option value="">선택</option>
            <option value="진행중">진행중</option>
            <option value="경험있음">경험있음</option>
            <option value="없음">없음</option>
          </select>
        </div>

        <div class="field">
          <label for="placeLink">플레이스 링크</label>
          <input id="placeLink" />
        </div>

        <div class="field">
          <label for="message">문의내용</label>
          <textarea id="message" required></textarea>
        </div>

        <button id="submitBtn" class="btn btn-primary" type="submit">
          상담 신청 보내기
        </button>

        <div id="submitStatus" class="submit-status"></div>
      </form>
    </div>
  </section>

  <script>
    const APPS_SCRIPT_URL =
      "https://script.google.com/macros/s/AKfycbwLSDjrrynq7hpz2ip7JUgi-B0ikQ4OZbLoWiaEMqG6Nvtzrqi0MCGasUdJzlaQnIhgtg/exec";

    const form = document.getElementById("consulting-form");
    const submitBtn = document.getElementById("submitBtn");
    const statusBox = document.getElementById("submitStatus");

    const companyNameInput = document.getElementById("companyName");
    const businessTypeInput = document.getElementById("businessType");
    const regionInput = document.getElementById("region");
    const phoneInput = document.getElementById("phone");
    const adStatusInput = document.getElementById("adStatus");
    const placeLinkInput = document.getElementById("placeLink");
    const messageInput = document.getElementById("message");

    function showStatus(type, message) {
      statusBox.className = "submit-status " + type;
      statusBox.innerText = message;
    }

    form.addEventListener("submit", async function(e) {
      e.preventDefault();

      submitBtn.disabled = true;
      submitBtn.innerText = "전송 중...";

      const payload = {
        companyName: companyNameInput.value.trim(),
        businessType: businessTypeInput.value.trim(),
        region: regionInput.value.trim(),
        phone: phoneInput.value.trim(),
        adStatus: adStatusInput.value,
        placeLink: placeLinkInput.value.trim(),
        message: messageInput.value.trim()
      };

      try {
        const res = await fetch(APPS_SCRIPT_URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify(payload)
        });

        const text = await res.text();

        let result = {};
        try {
          result = JSON.parse(text);
        } catch (err) {
          result = { success: false };
        }

        if (res.ok && result.success) {
          showStatus("success", "상담 신청이 정상 접수되었습니다.");

          if (typeof gtag === "function") {
            gtag("event", "generate_lead", {
              form_name: "consulting_form"
            });
          }

          if (typeof clarity === "function") {
            clarity("event", "consulting_form_submitted");
          }

          form.reset();
        } else {
          showStatus("error", "전송 실패. 다시 시도해주세요.");
        }

      } catch (e) {
        showStatus("error", "전송 실패. 다시 시도해주세요.");
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerText = "상담 신청 보내기";
      }
    });
  </script>
</body>
</html>
