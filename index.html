<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>LocalBooster | 로컬 비즈니스 마케팅</title>

<meta name="description"
content="네이버 플레이스, 체험단, 퍼포먼스 마케팅까지. 로컬 비즈니스에 맞는 마케팅 전략을 설계합니다.">

gtag('js', new Date());

  anonymize_ip: true,

<style>

body{
margin:0;
font-family:Pretendard,Noto Sans KR,Arial;
color:#111;
background:#fff;
line-height:1.6;
}

.container{
width:min(1180px,calc(100% - 24px));
margin:0 auto;
}

.hero-top{
background:#2b7fff;
color:white;
text-align:center;
padding:80px 0;
}

.hero-title{
font-size:clamp(46px,14vw,120px);
font-weight:900;
margin:0;
}

.hero-sub{
margin-top:10px;
font-size:18px;
opacity:0.9;
}

.section{
padding:80px 0;
}

.section-title{
font-size:clamp(30px,7vw,60px);
font-weight:900;
margin-bottom:16px;
}

.section-desc{
color:#667085;
font-size:16px;
}

.btn{
display:inline-flex;
align-items:center;
justify-content:center;
padding:14px 26px;
border-radius:999px;
font-weight:800;
border:none;
cursor:pointer;
}

.btn-primary{
background:#2b7fff;
color:white;
}

.btn-secondary{
background:#eef4ff;
color:#2b7fff;
}

.contact-form{
max-width:600px;
margin:auto;
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:6px;
border:1px solid #ddd;
border-radius:8px;
}

textarea{
min-height:120px;
}

.submit-status{
display:none;
margin-top:12px;
padding:10px;
border-radius:8px;
font-weight:700;
text-align:center;
}

.submit-status.success{
display:block;
background:#e8f9ef;
color:#0b7c3e;
}

.submit-status.error{
display:block;
background:#ffeaea;
color:#c80000;
}

</style>
</head>

<body>

<section class="hero-top">
<div class="container">
<h1 class="hero-title">LocalBooster</h1>
<p class="hero-sub">체험단 · 플레이스 · 퍼포먼스 마케팅</p>
</div>
</section>

<section class="section">
<div class="container">

<h2 class="section-title">
체험단부터 플레이스,<br>
퍼포먼스 마케팅까지 연결합니다.
</h2>

<p class="section-desc">
LocalBooster는 로컬 비즈니스에 맞는 체험단, 플레이스,
퍼포먼스 마케팅을 운영합니다.
</p>

</div>
</section>

<section class="section">
<div class="container">

<h2 class="section-title">무료 상담 신청</h2>

<form id="consulting-form" class="contact-form">

<label>
업체명
<input id="companyName" required>
</label>

<label>
업종
<input id="businessType" required>
</label>

<label>
지역
<input id="region" required>
</label>

<label>
연락처
<input id="phone" required>
</label>

<label>
현재 광고 여부
<select id="adStatus" required>
<option value="">선택</option>
<option>진행중</option>
<option>경험있음</option>
<option>없음</option>
</select>
</label>

<label>
플레이스 링크
<input id="placeLink">
</label>

<label>
문의내용
<textarea id="message" required></textarea>
</label>

<button class="btn btn-primary" type="submit">
상담 신청 보내기
</button>

<div id="submitStatus" class="submit-status"></div>

</form>

</div>
</section>

<script>

const APPS_SCRIPT_URL =
'https://script.google.com/macros/s/AKfycbwLSDjrrynq7hpz2ip7JUgi-B0ikQ4OZbLoWiaEMqG6Nvtzrqi0MCGasUdJzlaQnIhgtg/exec';

const form=document.getElementById("consulting-form");
const statusBox=document.getElementById("submitStatus");

form.addEventListener("submit",async function(e){

e.preventDefault();

const payload={
companyName:companyName.value,
businessType:businessType.value,
region:region.value,
phone:phone.value,
adStatus:adStatus.value,
placeLink:placeLink.value,
message:message.value
};

try{

const res=await fetch(APPS_SCRIPT_URL,{
method:"POST",
headers:{'Content-Type':'text/plain;charset=utf-8'},
body:JSON.stringify(payload)
});

const result=await res.json();

if(result.success){

statusBox.className="submit-status success";
statusBox.innerText="상담 신청이 정상 접수되었습니다.";

form.reset();

}else{

throw new Error();

}

}catch(e){

statusBox.className="submit-status error";
statusBox.innerText="전송 실패. 다시 시도해주세요.";

}

});

</script>

</body>
</html>
