  <style>
    * { box-sizing: border-box; }

    body{
      margin:0;
      font-family:Pretendard, "Noto Sans KR", Arial, sans-serif;
      color:#111;
      background:#fff;
      line-height:1.6;
      word-break:keep-all;
    }

    .container{
      width:min(1180px, calc(100% - 24px));
      margin:0 auto;
    }

    .hero-top{
      background:#2b7fff;
      color:#fff;
      text-align:center;
      padding:80px 0;
    }

    .hero-title{
      font-size:clamp(46px, 14vw, 120px);
      font-weight:900;
      margin:0;
      line-height:1.05;
    }

    .hero-sub{
      margin-top:10px;
      font-size:18px;
      opacity:0.92;
    }

    .section{
      padding:80px 0;
    }

    .section-title{
      font-size:clamp(30px, 7vw, 60px);
      font-weight:900;
      margin:0 0 16px;
      line-height:1.15;
    }

    .section-desc{
      color:#667085;
      font-size:16px;
      margin:0;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:100%;
      padding:16px 26px;
      border-radius:999px;
      font-weight:800;
      border:none;
      cursor:pointer;
      transition:opacity .2s ease, transform .2s ease;
      font-size:16px;
    }

    .btn:hover{
      opacity:.94;
    }

    .btn:disabled{
      opacity:.6;
      cursor:not-allowed;
    }

    .btn-primary{
      background:#2b7fff;
      color:#fff;
    }

    .contact-form{
      max-width:680px;
      margin:auto;
      display:grid;
      gap:18px;
    }

    .field{
      display:grid;
      gap:8px;
    }

    .field label{
      font-weight:700;
      font-size:15px;
    }

    input, select, textarea{
      width:100%;
      padding:14px 14px;
      border:1px solid #d0d5dd;
      border-radius:12px;
      font:inherit;
      background:#fff;
      color:#111;
      outline:none;
      transition:border-color .2s ease, box-shadow .2s ease;
    }

    input:focus, select:focus, textarea:focus{
      border-color:#2b7fff;
      box-shadow:0 0 0 4px rgba(43,127,255,.12);
    }

    textarea{
      min-height:140px;
      resize:vertical;
    }

    .help-text{
      color:#667085;
      font-size:13px;
      margin-top:-2px;
    }

    .check-wrap{
      display:flex;
      gap:10px;
      align-items:flex-start;
      font-size:14px;
      color:#344054;
    }

    .check-wrap input{
      width:18px;
      height:18px;
      margin-top:3px;
      flex:0 0 auto;
    }

    .submit-status{
      display:none;
      margin-top:4px;
      padding:12px 14px;
      border-radius:12px;
      font-weight:700;
      text-align:center;
      font-size:14px;
    }

    .submit-status.success{
      display:block;
      background:#e8f9ef;
      color:#0b7c3e;
      border:1px solid #b7ebc9;
    }

    .submit-status.error{
      display:block;
      background:#fff1f1;
      color:#c80000;
      border:1px solid #ffcaca;
    }

    .contact-note{
      max-width:680px;
      margin:14px auto 0;
      color:#667085;
      font-size:13px;
      text-align:center;
    }

    .hidden-field{
      position:absolute !important;
      left:-9999px !important;
      width:1px !important;
      height:1px !important;
      overflow:hidden !important;
    }

    @media (max-width: 768px){
      .hero-top{
        padding:64px 0;
      }

      .section{
        padding:56px 0;
      }
    }
  </style>
</head>

<body>
  <!-- GTM noscript -->
  <noscript>
    <iframe
      src="https://www.googletagmanager.com/ns.html?id=GTM-M2D936WX"
      height="0"
      width="0"
      style="display:none;visibility:hidden"
    ></iframe>
  </noscript>

  <section class="hero-top">
    <div class="container">
      <h1 class="hero-title">LocalBooster</h1>
      <p class="hero-sub">체험단 · 플레이스 · 퍼포먼스 마케팅</p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <h2 class="section-title">
        체험단부터 플레이스,<br />
        퍼포먼스 마케팅까지 연결합니다.
      </h2>

      <p class="section-desc">
        LocalBooster는 로컬 비즈니스에 맞는 체험단, 플레이스, 퍼포먼스 마케팅을 운영합니다.
      </p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <h2 class="section-title">무료 상담 신청</h2>

      <form id="consulting-form" class="contact-form" novalidate>
        <div class="field">
          <label for="companyName">업체명</label>
          <input id="companyName" name="companyName" type="text" required autocomplete="organization" />
        </div>

        <div class="field">
          <label for="businessType">업종</label>
          <input id="businessType" name="businessType" type="text" required autocomplete="off" />
        </div>

        <div class="field">
          <label for="region">지역</label>
          <input id="region" name="region" type="text" required autocomplete="address-level2" />
        </div>

        <div class="field">
          <label for="phone">연락처</label>
          <input
            id="phone"
            name="phone"
            type="tel"
            required
            inputmode="tel"
            autocomplete="tel"
            placeholder="예: 010-1234-5678"
          />
          <div class="help-text">숫자와 하이픈만 입력해도 됩니다.</div>
        </div>

        <div class="field">
          <label for="adStatus">현재 광고 여부</label>
          <select id="adStatus" name="adStatus" required>
            <option value="">선택</option>
            <option value="진행중">진행중</option>
            <option value="경험있음">경험있음</option>
            <option value="없음">없음</option>
          </select>
        </div>

        <div class="field">
          <label for="placeLink">플레이스 링크</label>
          <input
            id="placeLink"
            name="placeLink"
            type="url"
            placeholder="https://..."
            autocomplete="url"
          />
        </div>

        <div class="field">
          <label for="message">문의내용</label>
          <textarea
            id="message"
            name="message"
            required
            placeholder="업체 상황, 원하는 마케팅 방향, 현재 고민 등을 적어주세요."
          ></textarea>
        </div>

        <!-- 스팸 방지용 허니팟 -->
        <div class="hidden-field" aria-hidden="true">
          <label for="website">웹사이트</label>
          <input id="website" name="website" type="text" tabindex="-1" autocomplete="off" />
        </div>

        <label class="check-wrap" for="privacyConsent">
          <input id="privacyConsent" name="privacyConsent" type="checkbox" required />
          <span>
            상담 진행을 위한 개인정보 수집·이용에 동의합니다.
          </span>
        </label>

        <button id="submitBtn" class="btn btn-primary" type="submit">
          상담 신청 보내기
        </button>

        <div id="submitStatus" class="submit-status" role="status" aria-live="polite"></div>
      </form>

      <p class="contact-note">
        접수 후 확인하여 순차적으로 연락드립니다.
      </p>
    </div>
  </section>

  <script>
    const APPS_SCRIPT_URL =
      "https://script.google.com/macros/s/AKfycbwLSDjrrynq7hpz2ip7JUgi-B0ikQ4OZbLoWiaEMqG6Nvtzrqi0MCGasUdJzlaQnIhgtg/exec";

    const form = document.getElementById("consulting-form");
    const submitBtn = document.getElementById("submitBtn");
    const statusBox = document.getElementById("submitStatus");

    const companyNameInput = document.getElementById("companyName");
    const businessTypeInput = document.getElementById("businessType");
    const regionInput = document.getElementById("region");
    const phoneInput = document.getElementById("phone");
    const adStatusInput = document.getElementById("adStatus");
    const placeLinkInput = document.getElementById("placeLink");
    const messageInput = document.getElementById("message");
    const websiteInput = document.getElementById("website");
    const privacyConsentInput = document.getElementById("privacyConsent");

    function showStatus(type, message) {
      statusBox.className = "submit-status " + type;
      statusBox.textContent = message;
    }

    function clearStatus() {
      statusBox.className = "submit-status";
      statusBox.textContent = "";
    }

    function formatPhone(value) {
      return value.replace(/[^\d-]/g, "").trim();
    }

    function isValidUrl(value) {
      if (!value) return true;
      try {
        new URL(value);
        return true;
      } catch {
        return false;
      }
    }

    function validateForm() {
      const companyName = companyNameInput.value.trim();
      const businessType = businessTypeInput.value.trim();
      const region = regionInput.value.trim();
      const phone = formatPhone(phoneInput.value);
      const adStatus = adStatusInput.value.trim();
      const placeLink = placeLinkInput.value.trim();
      const message = messageInput.value.trim();

      if (!companyName) {
        showStatus("error", "업체명을 입력해주세요.");
        companyNameInput.focus();
        return false;
      }

      if (!businessType) {
        showStatus("error", "업종을 입력해주세요.");
        businessTypeInput.focus();
        return false;
      }

      if (!region) {
        showStatus("error", "지역을 입력해주세요.");
        regionInput.focus();
        return false;
      }

      if (!phone) {
        showStatus("error", "연락처를 입력해주세요.");
        phoneInput.focus();
        return false;
      }

      if (!adStatus) {
        showStatus("error", "현재 광고 여부를 선택해주세요.");
        adStatusInput.focus();
        return false;
      }

      if (placeLink && !isValidUrl(placeLink)) {
        showStatus("error", "플레이스 링크 형식이 올바르지 않습니다.");
        placeLinkInput.focus();
        return false;
      }

      if (!message) {
        showStatus("error", "문의내용을 입력해주세요.");
        messageInput.focus();
        return false;
      }

      if (!privacyConsentInput.checked) {
        showStatus("error", "개인정보 수집·이용 동의가 필요합니다.");
        privacyConsentInput.focus();
        return false;
      }

      return true;
    }

    form.addEventListener("submit", async function (e) {
      e.preventDefault();
      clearStatus();

      if (!validateForm()) return;

      // 허니팟 입력 시 스팸으로 간주
      if (websiteInput.value.trim() !== "") {
        showStatus("success", "상담 신청이 정상 접수되었습니다.");
        form.reset();
        return;
      }

      const payload = {
        companyName: companyNameInput.value.trim(),
        businessType: businessTypeInput.value.trim(),
        region: regionInput.value.trim(),
        phone: formatPhone(phoneInput.value),
        adStatus: adStatusInput.value.trim(),
        placeLink: placeLinkInput.value.trim(),
        message: messageInput.value.trim(),
        privacyConsent: privacyConsentInput.checked ? "동의" : "미동의",
        source: "website",
        createdAt: new Date().toISOString()
      };

      submitBtn.disabled = true;
      submitBtn.textContent = "전송 중...";

      try {
        const res = await fetch(APPS_SCRIPT_URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify(payload)
        });

        const text = await res.text();

        let result = {};
        try {
          result = JSON.parse(text);
        } catch {
          result = {};
        }

        if (res.ok && (result.success === true || text.includes('"success":true'))) {
          showStatus("success", "상담 신청이 정상 접수되었습니다.");

          if (typeof gtag === "function") {
            gtag("event", "generate_lead", {
              form_name: "consulting_form",
              page_title: document.title
            });
          }

          if (typeof clarity === "function") {
            clarity("event", "consulting_form_submitted");
          }

          form.reset();
        } else {
          throw new Error("submit_failed");
        }
      } catch (error) {
        showStatus("error", "전송 실패. 다시 시도해주세요.");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "상담 신청 보내기";
      }
    });
  </script>
</body>
</html>
